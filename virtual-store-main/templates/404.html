{% extends "base.html" %}
{% block title %}404 — Page Not Found{% endblock %}
{% block content %}
<section class="error-404">
  <div class="container">
    <div class="error-404__big" aria-hidden="true">404</div>
    <span class="eyebrow">Hmm</span>
    <h1>This page took a hike</h1>
    <p>Whatever you were looking for, it's not here. Maybe it never was. Let's get you back to civilization.</p>
    <div class="error-404__critter">(╯°□°)╯︵ ┻━┻</div>
    <a class="btn" href="{{ url_for('home') }}">Back to Home</a>
  </div>
</section>
{% endblock %}
