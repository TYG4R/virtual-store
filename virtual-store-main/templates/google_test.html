<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google Auth Test</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f8f9fa; display: flex; justify-content: center; padding: 2rem 1rem;
    min-height: 100vh;
  }
  .card { background: #fff; border-radius: 16px; padding: 2rem; max-width: 480px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  h1 { font-size: 1.3rem; margin-bottom: 0.5rem; }
  p { color: #666; font-size: 0.9rem; margin-bottom: 1.5rem; }
  .btn { display: block; width: 100%; padding: 0.85rem; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; text-align: center; margin-bottom: 0.75rem; }
  .btn-google { background: #fff; color: #444; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
  .btn-google:hover { background: #f5f5f5; }
  .btn-primary { background: #1a73e8; color: #fff; }
  .btn-primary:hover { background: #1557b0; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .log { background: #1e1e2e; color: #cdd6f4; border-radius: 10px; padding: 1rem; font-family: monospace; font-size: 0.8rem; max-height: 400px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; margin-top: 1rem; }
  .log .info { color: #89b4fa; }
  .log .success { color: #a6e3a1; }
  .log .error { color: #f38ba8; font-weight: bold; }
  .log .warn { color: #f9e2af; }
  .status { padding: 0.75rem; border-radius: 8px; margin: 1rem 0; font-size: 0.85rem; }
  .status.ready { background: #d1fae5; color: #065f46; }
  .status.waiting { background: #fef3c7; color: #92400e; }
  .status.error { background: #fee2e2; color: #991b1b; }
  .status.info { background: #dbeafe; color: #1e40af; }
  .token-box { background: #f0f4ff; border: 1px solid #b3c9ff; border-radius: 8px; padding: 0.75rem; font-size: 0.78rem; word-break: break-all; margin-top: 0.5rem; display: none; font-family: monospace; }
  hr { margin: 1.25rem 0; border: none; border-top: 1px solid #eee; }
</style>
</head>
<body>
<div class="card">
  <h1>🔑 Google Auth Test</h1>
  <p>Isolated debug page for Firebase Google Sign-In.</p>
  <div id="status" class="status info">⏳ Initializing...</div>
  <div id="configBox" class="token-box"></div>
  <button class="btn btn-google" id="googleBtn" disabled>
    <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
    Sign in with Google
  </button>
  <div class="log" id="log">[initializing...]</div>
  <hr>
  <details>
    <summary style="cursor:pointer;font-size:0.85rem;color:#666;">Actions</summary>
    <div style="margin-top:0.75rem;display:flex;flex-direction:column;gap:0.5rem;">
      <button class="btn btn-primary" id="checkBtn" style="font-size:0.85rem;padding:0.6rem;">🔄 Check auth state</button>
      <button class="btn btn-primary" id="tokenBtn" style="font-size:0.85rem;padding:0.6rem;">🎫 Show token</button>
      <button class="btn btn-primary" id="signOutBtn" style="font-size:0.85rem;padding:0.6rem;">🚪 Sign out</button>
    </div>
  </details>
</div>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script nonce="{{ csp_nonce }}">
const firebaseConfig = {
  apiKey: "AIzaSyA63xgO6olKBxB55Jq8nYbJJvfQeGe7PIY",
  authDomain: "store-36296.firebaseapp.com",
  projectId: "store-36296",
  storageBucket: "store-36296.firebasestorage.app",
  messagingSenderId: "629949102730",
  appId: "1:629949102730:web:6ebd052728a24521c44b73"
};
const log = document.getElementById("log");
const statusEl = document.getElementById("status");
const googleBtn = document.getElementById("googleBtn");
const configBox = document.getElementById("configBox");

function appendLog(msg, type) {
  const line = document.createElement("div");
  line.className = type || "info";
  line.textContent = "[" + new Date().toLocaleTimeString() + "] " + msg;
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
}
function setStatus(text, cls) {
  statusEl.textContent = text;
  statusEl.className = "status " + (cls || "info");
}
configBox.style.display = "block";
configBox.textContent = "Firebase Config:\n" + JSON.stringify(firebaseConfig, null, 2);
appendLog("Page loaded", "info");

try {
  firebase.initializeApp(firebaseConfig);
  appendLog("Firebase initialized", "success");
  googleBtn.disabled = false;
  setStatus("Ready. Tap Google sign-in.", "ready");
} catch (e) {
  appendLog("Init error: " + e.message, "error");
  setStatus("Init failed: " + e.message, "error");
}

firebase.auth().onAuthStateChanged(function(user) {
  if (user) {
    appendLog("Signed in: " + (user.displayName || user.email || user.phoneNumber || user.uid), "success");
    setStatus("Signed in as " + (user.displayName || user.email || user.uid), "ready");
    user.getIdToken().then(function(t) {
      appendLog("ID token: " + t.substring(0, 50) + "...", "success");
    });
  } else {
    appendLog("No user", "info");
  }
});

firebase.auth().getRedirectResult().then(function(result) {
  if (result && result.user) {
    appendLog("Redirect result received!", "success");
    appendLog("User: " + (result.user.displayName || result.user.email || result.user.uid), "success");
    setStatus("Signed in via redirect!", "success");
    result.user.getIdToken().then(function(t) {
      appendLog("Token: " + t.substring(0, 50) + "...", "success");
      var csrf = (document.querySelector('meta[name="csrf-token"]') || {}).content || "";
      fetch("/auth/phone/verify", {
        method: "POST",
        headers: {"Content-Type":"application/json","X-CSRF-Token": csrf},
        body: JSON.stringify({id_token: t, name: result.user.displayName||"", email: result.user.email||""})
      }).then(function(r){return r.json();}).then(function(d){
        if(d.success) appendLog("Backend session OK! Welcome "+(d.name||""), "success");
        else appendLog("Backend error: "+(d.error||"?"), "error");
      }).catch(function(e){
        appendLog("Backend fetch error: "+e.message, "error");
      });
    });
  } else {
    appendLog("No redirect result pending", "info");
  }
}).catch(function(err) {
  appendLog("Redirect error: " + (err.code || err.message), "error");
  appendLog("Full: " + JSON.stringify({code: err.code, message: err.message}), "error");
  setStatus("Error: " + (err.code || err.message), "error");
});

googleBtn.addEventListener("click", function() {
  appendLog("Button clicked", "info");
  setStatus("Signing in...", "waiting");
  var provider = new firebase.auth.GoogleAuthProvider();
  provider.addScope("profile");
  provider.addScope("email");
  try {
    firebase.auth().signInWithPopup(provider).then(function(result) {
      appendLog("Popup succeeded!", "success");
      appendLog("User: " + (result.user.displayName || result.user.email), "success");
      setStatus("Signed in!", "ready");
      result.user.getIdToken().then(function(t) {
        appendLog("Token: " + t.substring(0, 50), "success");
        var csrf = (document.querySelector('meta[name="csrf-token"]') || {}).content || "";
        fetch("/auth/phone/verify", {
          method: "POST",
          headers: {"Content-Type":"application/json","X-CSRF-Token": csrf},
          body: JSON.stringify({id_token: t, name: result.user.displayName||"", email: result.user.email||""})
        }).then(function(r){return r.json();}).then(function(d){
          if(d.success) appendLog("Backend session OK!", "success");
          else appendLog("Backend error: "+(d.error||"?"), "error");
        });
      });
    }).catch(function(err) {
      appendLog("Popup error: " + (err.code || err.message), "error");
      appendLog("Detail: " + JSON.stringify({code: err.code, message: err.message}), "error");
      setStatus("Popup failed, redirecting...", "error");
      firebase.auth().signInWithRedirect(provider);
    });
  } catch(e) {
    appendLog("Using redirect fallback", "warn");
    firebase.auth().signInWithRedirect(provider);
  }
});

document.getElementById("checkBtn").addEventListener("click", function() {
  var u = firebase.auth().currentUser;
  appendLog(u ? "User: " + (u.displayName || u.email || u.uid) : "No user", u ? "success" : "info");
});
document.getElementById("tokenBtn").addEventListener("click", function() {
  var u = firebase.auth().currentUser;
  if (u) u.getIdToken().then(function(t){appendLog("Token:\n"+t,"success");});
  else appendLog("No user","warn");
});
document.getElementById("signOutBtn").addEventListener("click", function() {
  firebase.auth().signOut().then(function(){appendLog("Signed out","warn");setStatus("Signed out","info");});
});
</script>
</body>
</html>
