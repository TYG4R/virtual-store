name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Create .env file with test defaults
        run: |
          cat > .env << 'EOF'
          SECRET_KEY=ci-test-secret-key-change-in-production
          DEBUG=false
          RAZORPAY_KEY_ID=rzp_test_ci_dummy
          RAZORPAY_KEY_SECRET=ci_test_razorpay_secret
          RAZORPAY_WEBHOOK_SECRET=ci_test_webhook_secret
          ADMIN_USERNAME=admin
          ADMIN_PASSWORD=ci-admin-password
          OTP_DEV_MODE=true
          EOF

      - name: Run tests with pytest
        run: python -m pytest -v
