{% extends "admin/base.html" %}
{% block title %}FAQs{% endblock %}
{% block content %}
<div class="admin-topbar"><h1>Frequently Asked Questions</h1></div>
<p class="help-text">These show up as an expandable list on your homepage, helping answer common questions before customers ask.</p>

{% for f in faqs %}
<div class="card-box">
  <form method="POST" action="{{ url_for('admin_faqs_save') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <input type="hidden" name="id" value="{{ f.id }}">
    <div class="field">
      <label>Question</label>
      <input type="text" name="question" value="{{ f.question }}" required>
    </div>
    <div class="field">
      <label>Answer</label>
      <textarea name="answer" required>{{ f.answer }}</textarea>
    </div>
    <div class="field field--checkbox">
      <input type="checkbox" name="visible" id="fvis-{{ f.id }}" {{ 'checked' if f.visible }}>
      <label for="fvis-{{ f.id }}" style="margin:0;">Show on homepage</label>
    </div>
    <button class="btn btn--outline btn--sm" type="submit">Save</button>
  </form>
  <form method="POST" action="{{ url_for('admin_faqs_delete', faq_id=f.id) }}"
        onsubmit="return confirm('Delete this question?');" style="margin-top:0.5rem;">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <button class="btn btn--danger btn--sm" type="submit">Delete</button>
  </form>
</div>
{% endfor %}

<div class="card-box">
  <h3>Add New Question</h3>
  <form method="POST" action="{{ url_for('admin_faqs_save') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="field">
      <label>Question</label>
      <input type="text" name="question" placeholder="e.g. How do I receive my product?" required>
    </div>
    <div class="field">
      <label>Answer</label>
      <textarea name="answer" placeholder="Write the answer here..." required></textarea>
    </div>
    <div class="field field--checkbox">
      <input type="checkbox" name="visible" id="fvis-new" checked>
      <label for="fvis-new" style="margin:0;">Show on homepage</label>
    </div>
    <button class="btn" type="submit">Add Question</button>
  </form>
</div>
{% endblock %}
